[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200

; Tento riadok povie kompilátoru, aby hľadal config.h v zdieľanom priečinkusdf,bjkn
build_flags = -I ../shared

; PlatformIO si tieto knižnice stiahne automaticky podľa tvojho main.cpp
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.3
    https://github.com/DFRobot/DFRobot_ENS160.git